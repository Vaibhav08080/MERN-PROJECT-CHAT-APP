services:
  backend:
    build: ./backend
    container_name: backend
    ports:
      - "5001:5000"              # host:container
    env_file:
      - ./backend/.env           # 🔥 load env vars
    environment:
      - MONGO_URI=mongodb://mongo:27017/mydb
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:5173"              # Vite runs on 5173 inside container
    depends_on:
      - backend

  mongo:
    image: mongo
    container_name: mongo
    volumes:
      - mongo-data:/data/db      # data persist rahega
    # ❌ ports remove (internal use best)
    # ports:
    #   - "30001:27017"

volumes:
  mongo-data: